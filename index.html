<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Settings</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --ios-bg: #1c1c1e;
            --ios-surface: #2c2c2e;
            --ios-accent: #3a3a3c; /* Серый акцент для кнопок */
            --ios-text: #ffffff;
            --ios-sec-text: #8e8e93;
            --ios-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: var(--ios-bg); color: var(--ios-text); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
        }

        /* ЭКРАН ВХОДА (iOS Чат) */
        #auth-screen {
            display: flex; flex-direction: column; height: 100vh;
            justify-content: flex-end; padding: 16px; box-sizing: border-box;
            background: var(--ios-bg); position: fixed; inset: 0; z-index: 10000;
        }
        
        .auth-bubble {
            align-self: flex-start; background: var(--ios-surface);
            padding: 10px 14px; border-radius: 16px 16px 16px 4px;
            margin-bottom: 15px; font-size: 15px; max-width: 85%;
            line-height: 1.4; color: var(--ios-text);
        }

        .ios-input-wrapper {
            display: flex; align-items: center; background: var(--ios-surface);
            border-radius: 22px; padding: 4px 6px 4px 14px;
            border: 0.5px solid var(--ios-border); margin-bottom: 10px;
        }
        
        .ios-input-wrapper input {
            background: transparent; border: none; color: white; flex: 1;
            padding: 8px 0; font-size: 16px; outline: none;
        }
        
        /* СЕРЫЙ САМОЛЕТИК */
        .ios-send-btn {
            background: #48484a; /* Темно-серый */
            color: #d1d1d6; 
            border: none; border-radius: 50%;
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; cursor: pointer; transform: rotate(-90deg);
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        #main-app { display: none; }

        .top-bar {
            display: flex; justify-content: space-between;
            padding: 10px 20px; align-items: center; height: 44px;
        }
        .icon-btn { font-size: 22px; color: var(--ios-sec-text); cursor: pointer; }
        .icon-btn.active { color: white; }

        .view { padding: 16px; height: calc(100vh - 160px); overflow-y: auto; display: none; }
        .view.active { display: block; }

        .ios-list { background: var(--ios-surface); border-radius: 10px; margin-bottom: 20px; }
        .ios-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; border-bottom: 0.5px solid var(--ios-border);
        }
        .ios-row:last-child { border-bottom: none; }

        /* ОСТРОВОК НАВИГАЦИИ */
        .island-nav {
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            background: rgba(44, 44, 46, 0.9); backdrop-filter: blur(15px);
            height: 60px; border-radius: 30px; display: flex;
            justify-content: space-around; align-items: center;
            border: 0.5px solid var(--ios-border);
        }
        .nav-link { color: var(--ios-sec-text); text-align: center; }
        .nav-link.active { color: white; }
        .nav-icon { font-size: 20px; display: block; }
        .nav-text { font-size: 10px; font-weight: 500; margin-top: 2px; }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen">
        <div class="auth-bubble">Система ожидает идентификатор. Введите код для синхронизации настроек администратора.</div>
        <div class="ios-input-wrapper">
            <input type="text" id="passInput" placeholder="Ваш ID...">
            <button class="ios-send-btn" onclick="unlock()">➤</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="main-app">
        <div class="top-bar">
            <div class="icon-btn" onclick="window.location.href='https://google.com'">🔍</div>
            <div class="icon-btn" id="ghost-btn" onclick="toggleGhost()">👻</div>
        </div>

        <div id="v-home" class="view active">
            <div class="ios-list">
                <div class="ios-row"><span>Системный статус</span><span style="color:var(--ios-sec-text)">Защищено</span></div>
                <div class="ios-row"><span>Обход ограничений</span><span style="color:var(--ios-sec-text)">Активен</span></div>
            </div>
        </div>

        <div id="v-geo" class="view">
            <div class="ios-list">
                <div class="ios-row" onclick="setG('55.7558,37.6173')"><span>Школа</span></div>
                <div class="ios-row" onclick="setG('55.8123,37.7011')"><span>Дом</span></div>
                <div class="ios-row" onclick="setG('55.7512,37.6184')"><span>Дача</span></div>
            </div>
        </div>

        <div id="v-opts" class="view">
            <div class="ios-list">
                <div class="ios-row"><span>Обновить права</span></div>
                <div class="ios-row"><span style="color:#ff453a">Скрыть иконку</span></div>
            </div>
        </div>

        <div class="island-nav">
            <div class="nav-link active" onclick="sw('home', this)"><span class="nav-icon">🏠</span><span class="nav-text">Главная</span></div>
            <div class="nav-link" onclick="sw('geo', this)"><span class="nav-icon">📍</span><span class="nav-text">Гео</span></div>
            <div class="nav-link" onclick="sw('opts', this)"><span class="nav-icon">⚙️</span><span class="nav-text">Опции</span></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#1c1c1e');

        if(localStorage.getItem('sys_unlocked')) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }

        function unlock() {
            const val = document.getElementById('passInput').value;
            if(val.trim().length > 0) {
                localStorage.setItem('sys_unlocked', 'true');
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function sw(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('v-' + viewId).classList.add('active');
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        let gh = false;
        function toggleGhost() {
            gh = !gh;
            document.getElementById('ghost-btn').classList.toggle('active');
            tg.HapticFeedback.impactOccurred('heavy');
        }

        function setG(co) { tg.showScanQrPopup({ text: "Координаты: " + co }); }
    </script>
</body>
</html>
